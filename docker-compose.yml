services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cricket-analysis-backend
    ports:
      - "8000:8000"
    environment:
      ALLOWED_ORIGINS: http://localhost:8080
      DATABASE_URL: sqlite:////app/backend/data/app.db
      JWT_SECRET_KEY: replace-with-a-long-random-secret-key-32chars-min
      JWT_EXPIRY_MINUTES: 720
      RATE_LIMIT_REQUESTS: 120
      RATE_LIMIT_WINDOW_SECONDS: 60
      LIVE_REFRESH_INTERVAL_SECONDS: 30
      LIVE_CACHE_TTL_SECONDS: 45
    volumes:
      - ./backend/data:/app/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: cricket-analysis-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
